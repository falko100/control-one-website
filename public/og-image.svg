<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3f7a"/>
      <stop offset="60%" style="stop-color:#2554a0"/>
      <stop offset="100%" style="stop-color:#1a3f7a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circle top-right -->
  <circle cx="1050" cy="80" r="320" fill="url(#glow)"/>

  <!-- Decorative circle bottom-left -->
  <circle cx="150" cy="580" r="200" fill="url(#glow)"/>

  <!-- Logo mark — simplified shield/check -->
  <g transform="translate(80, 72)">
    <rect width="48" height="48" rx="12" fill="#60a5fa" opacity="0.15"/>
    <path d="M24 8L10 14v10c0 9.9 6.1 19.1 14 22.5C31.9 43.1 38 33.9 38 24V14L24 8z" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M17 24l5 5 9-9" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Brand name -->
  <text x="144" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="-0.5">Control One</text>

  <!-- Divider line -->
  <rect x="80" y="148" width="60" height="3" rx="1.5" fill="#60a5fa"/>

  <!-- Main headline -->
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-2">ISO Compliance</text>
  <text x="80" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#93c5fd" letter-spacing="-2">Software voor MKB</text>

  <!-- Subline -->
  <text x="80" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#bfdbfe" letter-spacing="-0.3">Implementeer ISO 27001, 9001, 14001 en 45001</text>
  <text x="80" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#bfdbfe" letter-spacing="-0.3">zelf — zonder dure consultants.</text>

  <!-- Feature pills -->
  <g transform="translate(80, 470)">
    <!-- Pill 1 -->
    <rect width="176" height="40" rx="20" fill="#1e40af" opacity="0.6"/>
    <text x="88" y="25.5" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#93c5fd" text-anchor="middle" font-weight="600">ISO 27001</text>

    <!-- Pill 2 -->
    <rect x="192" width="152" height="40" rx="20" fill="#1e40af" opacity="0.6"/>
    <text x="268" y="25.5" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#93c5fd" text-anchor="middle" font-weight="600">ISO 9001</text>

    <!-- Pill 3 -->
    <rect x="360" width="160" height="40" rx="20" fill="#1e40af" opacity="0.6"/>
    <text x="440" y="25.5" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#93c5fd" text-anchor="middle" font-weight="600">ISO 14001</text>

    <!-- Pill 4 -->
    <rect x="536" width="160" height="40" rx="20" fill="#1e40af" opacity="0.6"/>
    <text x="616" y="25.5" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#93c5fd" text-anchor="middle" font-weight="600">ISO 45001</text>
  </g>

  <!-- CTA badge -->
  <rect x="80" y="545" width="190" height="44" rx="22" fill="#60a5fa"/>
  <text x="175" y="572" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a" text-anchor="middle" letter-spacing="0.2">Gratis starten →</text>

  <!-- URL -->
  <text x="1120" y="572" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#60a5fa" text-anchor="end" font-weight="500">control-one.nl</text>

  <!-- Right side mockup decoration -->
  <g transform="translate(780, 160)" opacity="0.85">
    <!-- Card background -->
    <rect width="340" height="260" rx="16" fill="#1e3a8a" stroke="#3b5bc4" stroke-width="1.5"/>
    <!-- Header bar -->
    <rect width="340" height="44" rx="16" fill="#2554a0"/>
    <rect x="0" y="28" width="340" height="16" fill="#2554a0"/>
    <!-- Dots -->
    <circle cx="20" cy="22" r="5" fill="#60a5fa" opacity="0.7"/>
    <circle cx="36" cy="22" r="5" fill="#93c5fd" opacity="0.5"/>
    <circle cx="52" cy="22" r="5" fill="#bfdbfe" opacity="0.3"/>
    <!-- Title bar -->
    <rect x="16" y="60" width="120" height="10" rx="5" fill="#3b5bc4"/>
    <!-- Progress bar -->
    <rect x="16" y="84" width="308" height="6" rx="3" fill="#1e40af"/>
    <rect x="16" y="84" width="200" height="6" rx="3" fill="#60a5fa"/>
    <!-- List items -->
    <rect x="16" y="108" width="8" height="8" rx="2" fill="#22c55e"/>
    <rect x="32" y="110" width="180" height="5" rx="2.5" fill="#3b5bc4"/>
    <rect x="16" y="128" width="8" height="8" rx="2" fill="#22c55e"/>
    <rect x="32" y="130" width="140" height="5" rx="2.5" fill="#3b5bc4"/>
    <rect x="16" y="148" width="8" height="8" rx="2" fill="#22c55e"/>
    <rect x="32" y="150" width="200" height="5" rx="2.5" fill="#3b5bc4"/>
    <rect x="16" y="168" width="8" height="8" rx="2" fill="#fbbf24"/>
    <rect x="32" y="170" width="160" height="5" rx="2.5" fill="#3b5bc4"/>
    <rect x="16" y="188" width="8" height="8" rx="2" fill="#3b5bc4"/>
    <rect x="32" y="190" width="120" height="5" rx="2.5" fill="#2554a0"/>
    <!-- Bottom CTA -->
    <rect x="16" y="220" width="120" height="28" rx="8" fill="#60a5fa"/>
    <rect x="148" y="220" width="80" height="28" rx="8" fill="#1e40af" stroke="#3b5bc4" stroke-width="1"/>
  </g>
</svg>
