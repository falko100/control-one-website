<svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stepBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#eff8ff"/>
      <stop offset="100%" style="stop-color:#dbeffe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" rx="16" fill="#f8fbff" stroke="#dbeffe" stroke-width="1.5"/>

  <!-- Title -->
  <text x="450" y="36" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#02095a" text-anchor="middle">Het 8-stappen implementatieproces</text>

  <!-- Connector line -->
  <line x1="80" y1="130" x2="820" y2="130" stroke="#bfe3fe" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Steps -->
  <!-- Step 1 -->
  <g transform="translate(50,80)">
    <circle cx="30" cy="50" r="26" fill="#1563b8"/>
    <text x="30" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">1</text>
    <text x="30" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="white" text-anchor="middle">Commit</text>
    <text x="30" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">Management</text>
    <text x="30" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">commitment</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(150,80)">
    <circle cx="30" cy="50" r="26" fill="#196bd7"/>
    <text x="30" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">2</text>
    <text x="30" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="white" text-anchor="middle">Scope</text>
    <text x="30" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">Scope</text>
    <text x="30" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">bepalen</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(250,80)">
    <circle cx="30" cy="50" r="26" fill="#2d8dda"/>
    <text x="30" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">3</text>
    <text x="30" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="white" text-anchor="middle">Gap</text>
    <text x="30" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">Gap-</text>
    <text x="30" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">analyse</text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(350,80)">
    <circle cx="30" cy="50" r="26" fill="#48aeec"/>
    <text x="30" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">4</text>
    <text x="30" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="white" text-anchor="middle">Risico</text>
    <text x="30" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">Risico-</text>
    <text x="30" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">analyse</text>
  </g>

  <!-- Step 5 -->
  <g transform="translate(450,80)">
    <circle cx="30" cy="50" r="26" fill="#6fd0f0"/>
    <text x="30" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#02095a" text-anchor="middle">5</text>
    <text x="30" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#02095a" text-anchor="middle">VvT</text>
    <text x="30" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">Verklaring</text>
    <text x="30" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">toepasselijkheid</text>
  </g>

  <!-- Step 6 -->
  <g transform="translate(560,80)">
    <circle cx="30" cy="50" r="26" fill="#f59e0b"/>
    <text x="30" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">6</text>
    <text x="30" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="white" text-anchor="middle">Controls</text>
    <text x="30" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">Maatregelen</text>
    <text x="30" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">implementeren</text>
  </g>

  <!-- Step 7 -->
  <g transform="translate(660,80)">
    <circle cx="30" cy="50" r="26" fill="#f97316"/>
    <text x="30" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">7</text>
    <text x="30" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="white" text-anchor="middle">Intern</text>
    <text x="30" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">Interne audit +</text>
    <text x="30" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#02095a" text-anchor="middle">directiebeoord.</text>
  </g>

  <!-- Step 8 -->
  <g transform="translate(760,80)">
    <circle cx="30" cy="50" r="26" fill="#16a34a"/>
    <text x="30" y="39" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">8</text>
    <text x="30" y="53" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="white" text-anchor="middle">Certificaat</text>
    <text x="30" y="94" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#16a34a" text-anchor="middle">Externe</text>
    <text x="30" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10.5" font-weight="600" fill="#16a34a" text-anchor="middle">certificering</text>
  </g>

  <!-- Duration bar -->
  <rect x="50" y="220" width="760" height="8" rx="4" fill="#dbeffe"/>
  <rect x="50" y="220" width="200" height="8" rx="4" fill="#1563b8"/>
  <text x="50" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1563b8" font-weight="600">Maanden 1–2</text>
  <text x="265" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#48aeec" font-weight="600">Maanden 2–5</text>
  <text x="490" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f59e0b" font-weight="600">Maanden 3–8 (bewijsperiode)</text>
  <text x="700" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#16a34a" font-weight="600">Maand 9</text>

  <!-- Legend label -->
  <text x="450" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#0e2470" text-anchor="middle" opacity="0.6">Totale doorlooptijd: 5–9 maanden afhankelijk van organisatiegrootte</text>

  <!-- Certificate badge top right -->
  <g transform="translate(820, 20)">
    <rect width="64" height="28" rx="14" fill="#dcfce7"/>
    <text x="32" y="18" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#16a34a" text-anchor="middle">ISO 27001</text>
  </g>
</svg>
