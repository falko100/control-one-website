<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="60%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow circles -->
  <circle cx="1000" cy="100" r="300" fill="#3b82f6" opacity="0.08"/>
  <circle cx="200" cy="500" r="200" fill="#60a5fa" opacity="0.06"/>

  <!-- Category badge -->
  <rect x="80" y="72" width="130" height="32" rx="16" fill="#1e3a8a" opacity="0.8"/>
  <text x="145" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#93c5fd" text-anchor="middle">ISO 27001</text>

  <!-- Main headline -->
  <text x="80" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="58" font-weight="800" fill="white" letter-spacing="-2">ISO 27001 Implementeren</text>
  <text x="80" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="800" fill="url(#accent)" letter-spacing="-1.5">Compleet Stappenplan</text>
  <text x="80" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="700" fill="#93c5fd" letter-spacing="-1">voor MKB (2025)</text>

  <!-- Description -->
  <text x="80" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#bfdbfe" opacity="0.85">Van gap-analyse tot certificering — zonder dure consultants</text>

  <!-- Steps visual -->
  <g transform="translate(80, 420)">
    <!-- Step dots -->
    <circle cx="16" cy="16" r="14" fill="#3b82f6" opacity="0.9"/>
    <text x="16" y="21" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">1</text>
    <line x1="32" y1="16" x2="72" y2="16" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

    <circle cx="88" cy="16" r="14" fill="#3b82f6" opacity="0.9"/>
    <text x="88" y="21" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">2</text>
    <line x1="104" y1="16" x2="144" y2="16" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

    <circle cx="160" cy="16" r="14" fill="#3b82f6" opacity="0.9"/>
    <text x="160" y="21" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">3</text>
    <line x1="176" y1="16" x2="216" y2="16" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

    <circle cx="232" cy="16" r="14" fill="#3b82f6" opacity="0.9"/>
    <text x="232" y="21" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">4</text>
    <line x1="248" y1="16" x2="288" y2="16" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

    <circle cx="304" cy="16" r="14" fill="#3b82f6" opacity="0.9"/>
    <text x="304" y="21" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">5</text>
    <line x1="320" y1="16" x2="360" y2="16" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

    <circle cx="376" cy="16" r="14" fill="#22c55e" opacity="0.9"/>
    <text x="376" y="21" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">✓</text>

    <!-- Labels -->
    <text x="16" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Scope</text>
    <text x="88" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Gap-analyse</text>
    <text x="160" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Risico's</text>
    <text x="232" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Controls</text>
    <text x="304" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Audit</text>
    <text x="376" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">Cert.</text>
  </g>

  <!-- Read time badge -->
  <text x="80" y="540" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#60a5fa" opacity="0.7">12 min leestijd · Control One</text>

  <!-- URL -->
  <text x="1120" y="580" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#60a5fa" text-anchor="end" font-weight="500" opacity="0.8">control-one.nl/blog</text>
</svg>
