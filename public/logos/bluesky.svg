<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 176 40" fill="none">
  <defs>
    <linearGradient id="bs" x1="18" y1="1" x2="18" y2="39" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Circle base -->
  <circle cx="18" cy="20" r="17" fill="url(#bs)"/>
  <!-- Sky: gradient fill below horizon (subtle lighter area) -->
  <path d="M1 20C1 20 5 28 18 28C31 28 35 20 35 20" fill="white" fill-opacity="0.08"/>
  <!-- Horizon line -->
  <line x1="3" y1="25" x2="33" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <!-- Rising sun: bold semicircle -->
  <path d="M10 25C10 20.03 13.58 16 18 16C22.42 16 26 20.03 26 25" fill="white" fill-opacity="0.95"/>
  <!-- Sun rays: 5 clean lines above -->
  <line x1="18" y1="7" x2="18" y2="10.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="9.5" x2="23" y2="12" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="11" y1="9.5" x2="13" y2="12" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="29.5" y1="15" x2="27" y2="16.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="6.5" y1="15" x2="9" y2="16.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- Wordmark -->
  <text x="46" y="16" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#0f172a" letter-spacing="-0.4">BlueSky</text>
  <text x="46" y="31" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#94a3b8">Consulting</text>
</svg>
