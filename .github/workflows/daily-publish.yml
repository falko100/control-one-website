name: Dagelijkse blog publicatie

# Triggert elke nacht een Netlify build-hook zodat geplande blog-posts
# (met publishDate vandaag of in het verleden) automatisch verschijnen.
#
# Setup (eenmalig):
#   1. Netlify: Site settings → Build & deploy → Build hooks → "Add build hook"
#      Geef het een naam (bv. "GitHub daily cron") en branch "main".
#   2. Kopieer de hook-URL (vorm: https://api.netlify.com/build_hooks/abc123…).
#   3. GitHub repo → Settings → Secrets and variables → Actions →
#      "New repository secret" met naam NETLIFY_BUILD_HOOK_URL en de URL als waarde.
#
# Daarna draait deze workflow elke nacht en de site rebuildt zichzelf.

on:
  # Elke dag om 00:05 CET (23:05 UTC)
  schedule:
    - cron: '5 23 * * *'
  # Handmatig triggeren via GitHub UI
  workflow_dispatch:

jobs:
  trigger-netlify-build:
    name: Trigger Netlify build hook
    runs-on: ubuntu-latest
    steps:
      - name: POST naar Netlify build hook
        env:
          HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::Secret NETLIFY_BUILD_HOOK_URL is niet ingesteld."
            echo "Zie de comment bovenaan dit bestand voor setup-instructies."
            exit 1
          fi
          echo "Triggering Netlify build…"
          response=$(curl -sS -X POST -w "\nHTTP %{http_code}" "$HOOK_URL")
          echo "$response"
          # Netlify build hook geeft 200 of 202 bij succes
          code=$(echo "$response" | tail -1 | awk '{print $2}')
          if [ "$code" != "200" ] && [ "$code" != "202" ]; then
            echo "::error::Netlify hook gaf HTTP $code terug"
            exit 1
          fi
          echo "✓ Netlify build getriggerd"
